<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h2>🎉 Welcome {{ name }}!</h2>

    <p><strong>🌐 Language:</strong> {{ language }}</p>
    <p><strong>📍 State:</strong> {{ state }}</p>
    <p><strong>📞 Contact:</strong> {{ contact }}</p>

    <h3>📍 Amazing Places in {{ city.capitalize() }}</h3>

    <ul>
        {% for place in result %}
            <li>{{ place }}</li>
        {% endfor %}
    </ul>

    <a href="/">⬅ Back to Home</a>

</div>

<footer class="footer">
    <p>❤️ Made with love by Manas and Amandeep</p>
</footer>

</body>
</html>
